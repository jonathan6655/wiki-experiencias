<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Wiki Moderna</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

    <aside class="sidebar">
        <h2>📘 Wiki</h2>

        <button onclick="showView('inicio')">Inicio</button>
        <button onclick="showView('crear')">Crear artículo</button>
        <button onclick="showView('ia')">IA</button>
        <button onclick="showView('perfil')">Perfil</button>
        <button onclick="logout()">Salir</button>
    </aside>

    <main>

        <!-- INICIO -->
        <section id="inicio" class="view">
            <h1>Artículos recientes</h1>
            <div id="posts"></div>
        </section>

        <!-- CREAR -->
        <section id="crear" class="view">
            <div class="card">
                <h2>Nuevo artículo</h2>

                <input id="titulo" placeholder="Título">
                <textarea id="contenido" placeholder="Contenido"></textarea>
                <input id="imagen" placeholder="URL imagen">

                <button onclick="crearPost()">Publicar</button>
            </div>
        </section>

        <!-- IA -->
        <section id="ia" class="view">
            <div class="card">
                <h2>Asistente IA</h2>

                <textarea id="pregunta" placeholder="Haz una pregunta..."></textarea>
                <button onclick="usarIA()">Preguntar</button>

                <p id="respuesta"></p>
            </div>
        </section>

        <!-- PERFIL -->
        <section id="perfil" class="view">
            <h2>Perfil</h2>
            <p id="email"></p>
        </section>

    </main>

</div>

<script src="script.js"></script>
</body>
</html>
